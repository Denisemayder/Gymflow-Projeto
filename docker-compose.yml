services:
  nginx:
    image: nginx:alpine
    container_name: gymflow-nginx-proxy
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - proxy-network
    depends_on:
      - app
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gymflow-app
    restart: always
    env_file:
      - .env
    environment:
      DB_HOST: gymflow-db
    networks:
      - proxy-network
      - db-network
    depends_on:
      db:
        condition: service_healthy
  db:
    image: postgres:17-alpine
    container_name: gymflow-db
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/setup.sql:/docker-entrypoint-initdb.d/01-setup.sql:ro
      - ./scripts/seed/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    networks:
      - db-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
  cache:
    image: redis:7-alpine
    container_name: gymflow-cache
    restart: always
    networks:
      - db-network
  cli:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gymflow-cli
    env_file:
      - .env
    environment:
      DB_HOST: gymflow-db
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    working_dir: /app
    networks:
      - db-network
volumes:
  postgres_data:
networks:
  proxy-network:
    driver: bridge
  db-network:
    driver: bridge
